---
# ── Deploy rápido para OpenShift Developer Sandbox ──────────────────
# Uso:
#   oc apply -f openshift/sandbox-deploy.yaml
#
# Diferenças em relação ao deployment.yaml principal:
#  - Sem definição de runAsUser (Sandbox define o UID automaticamente via SCC)
#  - Sem PVC para RabbitMQ (usa emptyDir — dados perdidos ao reiniciar)
#  - Resources reduzidos para caber na quota (3 cores / 14 GB total)
#  - 1 réplica apenas (sem HPA, quota não suporta 2+ pods grandes)
# ─────────────────────────────────────────────────────────────────────

# ── Secret RabbitMQ ──────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-credentials
type: Opaque
stringData:
  username: admin
  password: sandbox-pass-123
  url: amqp://admin:sandbox-pass-123@rabbitmq:5672/

---
# ── RabbitMQ Deployment (stateless no Sandbox) ──────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  labels:
    app: rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "15692"
        prometheus.io/path:   "/metrics"
    spec:
      # Sandbox: NÃO defina runAsUser — o SCC restricted-v2 atribui UID automaticamente
      securityContext:
        runAsNonRoot: true
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
            - containerPort: 15692
              name: metrics
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: username
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: password
            - name: RABBITMQ_ENABLED_PLUGINS_FILE
              value: /etc/rabbitmq/enabled_plugins
          command:
            - sh
            - -c
            - |
              echo '[rabbitmq_management,rabbitmq_prometheus].' > /etc/rabbitmq/enabled_plugins
              rabbitmq-server
          resources:
            requests:
              cpu:    "100m"
              memory: "256Mi"
            limits:
              cpu:    "400m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 40
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "check_running"]
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
      volumes:
        # emptyDir no Sandbox — dados não persistem entre reinicializações
        - name: rabbitmq-data
          emptyDir: {}

---
# ── RabbitMQ Service ─────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  labels:
    app: rabbitmq
    monitoring: prometheus
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
    - name: metrics
      port: 15692
      targetPort: 15692

---
# ── devops-api Deployment ────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-api
  labels:
    app: devops-api
  annotations:
    instrumentation.opentelemetry.io/inject-python: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-api
  template:
    metadata:
      labels:
        app: devops-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8000"
        prometheus.io/path:   "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: devops-api
          # Substitua pela sua imagem no ghcr.io ou quay.io
          image: ghcr.io/SUA_ORG/devops-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: APP_ENV
              value: sandbox
            - name: APP_VERSION
              value: "1.0.0"
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: url
          resources:
            requests:
              cpu:    "100m"
              memory: "128Mi"
            limits:
              cpu:    "300m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}

---
# ── Service da API ───────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: devops-api
  labels:
    app: devops-api
    monitoring: prometheus
spec:
  selector:
    app: devops-api
  ports:
    - name: http
      port: 80
      targetPort: 8000

---
# ── Route (HTTPS automático no Sandbox) ─────────────────────────────
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: devops-api
  labels:
    app: devops-api
spec:
  to:
    kind: Service
    name: devops-api
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
