---
# ── RabbitMQ StatefulSet ─────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: phillk8s-dev
  labels:
    app: rabbitmq
spec:
  serviceName: rabbitmq
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "15692"
        prometheus.io/path:   "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 999
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
            - containerPort: 15692
              name: metrics
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: username
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: password
            - name: RABBITMQ_PLUGINS_ENABLE
              value: "rabbitmq_management,rabbitmq_prometheus"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "check_running"]
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 5Gi

---
# ── RabbitMQ Services ────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: phillk8s-dev
  labels:
    app: rabbitmq
    monitoring: prometheus
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
    - name: metrics
      port: 15692
      targetPort: 15692
  type: ClusterIP

---
# ── RabbitMQ Secret (valores exemplo — use Vault ou SealedSecrets) ───
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-credentials
  namespace: phillk8s-dev
type: Opaque
stringData:
  username: admin
  password: CHANGE_ME_USE_VAULT
  url: amqp://admin:CHANGE_ME_USE_VAULT@rabbitmq:5672/
