[openshift_nodes]
node1.example.com ansible_user=ec2-user
node2.example.com ansible_user=ec2-user

[monitoring]
prometheus.example.com ansible_user=ec2-user
grafana.example.com    ansible_user=ec2-user

[all:vars]
ansible_ssh_private_key_file=~/.ssh/devops_key
ansible_python_interpreter=/usr/bin/python3

[openshift_nodes:vars]
openshift_namespace=devops-project
app_image_registry=ghcr.io/sua-org

[monitoring:vars]
prometheus_retention=30d
grafana_admin_user=admin
