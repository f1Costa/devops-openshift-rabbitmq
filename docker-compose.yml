version: "3.9"

# ──────────────────────────────────────────────────────────────────
# Stack local — espelha o ambiente OpenShift para desenvolvimento
# Uso: docker compose up -d
# ──────────────────────────────────────────────────────────────────

services:

  # ── API Principal ─────────────────────────────────────────────
  api:
    build:
      context: app/
      dockerfile: Dockerfile
    container_name: devops-api
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      APP_VERSION: local
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devops-net
    volumes:
      - ./app:/app   # hot-reload em desenvolvimento

  # ── RabbitMQ ─────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
      - "15692:15692"   # Prometheus metrics
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - devops-net
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  # ── Prometheus ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - devops-net

  # ── Grafana ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - devops-net

  # ── SonarQube (análise local) ─────────────────────────────────
  sonarqube:
    image: sonarqube:10.5-community
    container_name: sonarqube
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonar-data:/opt/sonarqube/data
      - sonar-logs:/opt/sonarqube/logs
    networks:
      - devops-net

networks:
  devops-net:
    driver: bridge

volumes:
  rabbitmq-data:
  prometheus-data:
  grafana-data:
  sonar-data:
  sonar-logs:
