name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_NAME: devops-api
  OPENSHIFT_NAMESPACE: phillk8s-dev
  DYNATRACE_ENV_URL: ${{ secrets.DYNATRACE_ENV_URL }}

# ──────────────────────────────────────────────────────────────────
# JOB 1 — Qualidade de código (SonarQube + testes + cobertura)
# ──────────────────────────────────────────────────────────────────
jobs:
  quality:
    name: 🔍 Code Quality & Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # SonarQube precisa do histórico completo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --junitxml=test-results.xml \
            -v
        env:
          APP_ENV: test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml

      # ── SonarCloud Analysis ─────────────────────────────────────
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ──────────────────────────────────────────────────────────────────
  # JOB 2 — Build & Push da imagem Docker
  # ──────────────────────────────────────────────────────────────────
  build:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest
    needs: quality
    if: always()
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: app/
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ github.sha }}

      # ── Notifica Dynatrace sobre o build ───────────────────────
      - name: Notify Dynatrace — Build Event
        continue-on-error: true
        run: |
          curl -sf -X POST "${{ env.DYNATRACE_ENV_URL }}/api/v2/events/ingest" \
            -H "Authorization: Api-Token ${{ secrets.DYNATRACE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "eventType": "CUSTOM_DEPLOYMENT",
              "title": "Deploy devops-api",
              "properties": {
                "app_name": "devops-api",
                "app_version": "${{ github.sha }}",
                "git_branch": "${{ github.ref_name }}",
                "triggered_by": "${{ github.actor }}",
                "environment": "production"
              }
            }'

  # ──────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy no OpenShift (staging)
  # DESABILITADO: usando apenas deploy-production no OpenShift Sandbox
  # ──────────────────────────────────────────────────────────────────
  # deploy-staging:
  #   name: 🚀 Deploy → Staging
  #   runs-on: ubuntu-latest
  #   needs: build
  #   environment:
  #     name: staging
  #     url: https://devops-api-staging.example.com
  #   if: github.ref == 'refs/heads/develop'
  #
  #   steps:
  #     - name: Checkout
  #       uses: actions/checkout@v4
  #
  #     - name: Install OpenShift CLI
  #       uses: redhat-actions/openshift-tools-installer@v1
  #       with:
  #         oc: "4.14"
  #
  #     - name: Authenticate to OpenShift
  #       uses: redhat-actions/oc-login@v1
  #       with:
  #         openshift_server_url: ${{ secrets.OPENSHIFT_SERVER_URL }}
  #         openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
  #         namespace: ${{ env.OPENSHIFT_NAMESPACE }}-staging
  #
  #     - name: Update image tag and apply manifests
  #       run: |
  #         IMAGE_TAG=${{ needs.build.outputs.image-tag }}
  #         sed -i "s|IMAGE_TAG_PLACEHOLDER|${IMAGE_TAG}|g" openshift/deployment.yaml
  #         oc apply -f openshift/ --namespace ${{ env.OPENSHIFT_NAMESPACE }}-staging
  #
  #     - name: Wait for rollout
  #       run: |
  #         oc rollout status deployment/devops-api \
  #           --namespace ${{ env.OPENSHIFT_NAMESPACE }}-staging \
  #           --timeout=5m
  #
  #     # ── Notifica Dynatrace sobre o deploy ─────────────────────
  #     - name: Notify Dynatrace — Deployment Event (Staging)
  #       if: false
  #       run: |
  #         curl -sf -X POST "${{ env.DYNATRACE_ENV_URL }}/api/v2/events/ingest" \
  #           -H "Authorization: Api-Token ${{ secrets.DYNATRACE_API_TOKEN }}" \
  #           -H "Content-Type: application/json" \
  #           -d '{
  #             "eventType": "CUSTOM_DEPLOYMENT",
  #             "title": "Deploy: devops-api → staging",
  #             "properties": {
  #               "environment":  "staging",
  #               "version":      "${{ needs.build.outputs.image-tag }}",
  #               "git_commit":   "${{ github.sha }}",
  #               "triggered_by": "${{ github.actor }}"
  #             }
  #           }'

  # ──────────────────────────────────────────────────────────────────
  # JOB 4 — Deploy no OpenShift (production)
  # ──────────────────────────────────────────────────────────────────
  deploy-production:
    name: 🏁 Deploy → Production
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://devops-api.example.com
    if: always()
    outputs:
      app-url: ${{ steps.route.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OpenShift CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: "4.14"

      - name: Authenticate to OpenShift
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER_URL }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          namespace: ${{ env.OPENSHIFT_NAMESPACE }}

      - name: Update image tag and apply manifests
        run: |
          IMAGE_TAG="sha-$(echo '${{ github.sha }}' | cut -c1-7)"
          sed -i "s|IMAGE_TAG_PLACEHOLDER|${IMAGE_TAG}|g" openshift/sandbox-deploy.yaml
          oc apply -f openshift/sandbox-deploy.yaml --namespace ${{ env.OPENSHIFT_NAMESPACE }}
          oc rollout restart deployment/devops-api --namespace ${{ env.OPENSHIFT_NAMESPACE }}

      - name: Wait for rollout
        run: |
          oc rollout status deployment/devops-api \
            --namespace ${{ env.OPENSHIFT_NAMESPACE }} \
            --timeout=8m

      - name: Get Route URL
        id: route
        run: |
          ROUTE=$(oc get route devops-api \
            --namespace ${{ env.OPENSHIFT_NAMESPACE }} \
            -o jsonpath='{.spec.host}')
          echo "url=https://${ROUTE}" >> $GITHUB_OUTPUT
          echo "Route URL: https://${ROUTE}"

      # ── Dynatrace: abre janela de observação pós-deploy ───────
      - name: Notify Dynatrace — Deployment Event (Production)
        continue-on-error: true
        run: |
          curl -sf -X POST "${{ env.DYNATRACE_ENV_URL }}/api/v2/events/ingest" \
            -H "Authorization: Api-Token ${{ secrets.DYNATRACE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "eventType": "CUSTOM_DEPLOYMENT",
              "title": "Deploy devops-api",
              "properties": {
                "app_name": "devops-api",
                "app_version": "${{ github.sha }}",
                "git_branch": "${{ github.ref_name }}",
                "triggered_by": "${{ github.actor }}",
                "environment": "production"
              }
            }'

  # ──────────────────────────────────────────────────────────────────
  # JOB 5 — Smoke test pós-deploy
  # ──────────────────────────────────────────────────────────────────
  smoke-test:
    name: 💨 Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always() && needs.deploy-production.result == 'success'

    steps:
      - name: Health check
        run: |
          URL="${{ needs.deploy-production.outputs.app-url }}"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${URL}/health")
            [ "$STATUS" == "200" ] && echo "✅ Health check passed" && exit 0
            echo "Attempt $i failed (HTTP $STATUS), retrying in 10s..."
            sleep 10
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1

      - name: Readiness check
        run: |
          curl -sf "${{ needs.deploy-production.outputs.app-url }}/ready" | jq .

  # ──────────────────────────────────────────────────────────────────
  # JOB 6 — Ingest Prometheus metrics into Dynatrace
  # ──────────────────────────────────────────────────────────────────
  ingest-metrics:
    name: 📊 Ingest Metrics → Dynatrace
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always() && needs.deploy-production.result == 'success'

    steps:
      - name: Fetch and ingest Prometheus metrics
        run: |
          METRICS_URL="https://devops-api-phillk8s-dev.apps.rm1.0a51.p1.openshiftapps.com/metrics"

          # Fetch raw Prometheus metrics
          RAW=$(curl -sf "$METRICS_URL")

          # Extract http_requests_total (sum all status labels)
          HTTP_TOTAL=$(echo "$RAW" | grep '^http_requests_total{' | awk -F' ' '{sum += $NF} END {print sum+0}')

          # Extract rabbitmq_connection_status
          RABBITMQ_STATUS=$(echo "$RAW" | grep '^rabbitmq_connection_status ' | awk '{print $NF}')
          RABBITMQ_STATUS=${RABBITMQ_STATUS:-0}

          echo "http_requests_total=$HTTP_TOTAL"
          echo "rabbitmq_connection_status=$RABBITMQ_STATUS"

          # Build metrics ingest payload (Dynatrace line protocol)
          PAYLOAD="devops.api.http_requests_total,environment=production $HTTP_TOTAL
          devops.api.rabbitmq_connection_status,environment=production $RABBITMQ_STATUS"

          curl -sf -X POST "${{ secrets.DYNATRACE_ENV_URL }}/api/v2/metrics/ingest" \
            -H "Authorization: Api-Token ${{ secrets.DYNATRACE_API_TOKEN }}" \
            -H "Content-Type: text/plain" \
            --data-binary "$PAYLOAD"

          echo "✅ Metrics ingested successfully"
